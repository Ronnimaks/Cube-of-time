<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cube of Time</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle at top, #0b1c2d, #02070d);
        color: #e6f1ff;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        width: 90%;
        max-width: 360px;
        background: rgba(10, 25, 45, 0.9);
        border: 2px solid #2d6cff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 0 40px rgba(45,108,255,0.4);
        text-align: center;
        animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .title {
        font-size: 22px;
        letter-spacing: 2px;
        margin-bottom: 8px;
    }

    .subtitle {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 16px;
    }

    .rarity {
        color: #4fa3ff;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .character {
        font-size: 26px;
        margin-bottom: 6px;
    }

    .role {
        font-size: 14px;
        opacity: 0.85;
        margin-bottom: 20px;
    }

    .desc {
        font-size: 13px;
        opacity: 0.75;
        margin-bottom: 24px;
    }

    .btn {
        display: block;
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #4fa3ff, #2d6cff);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(79,163,255,0.6);
    }

    .btn:active {
        transform: scale(0.97);
    }
</style>
</head>
<body>

<div class="card">
    <div class="title">ПОЗДРАВЛЯЕМ</div>
    <div class="subtitle">Ты нашёл Куб Времени</div>

    <div class="rarity">Редкость: RARE</div>

    <div class="character">СИАРА</div>
    <div class="role">Хранительница Времени</div>

    <div class="desc">
        Этот персонаж ещё не активирован.<br>
        Чтобы раскрыть его силу, требуется активация.
    </div>

    <button class="btn">АКТИВИРОВАТЬ</button>
</div>

</body>
</html>
